body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

.search-section{margin-bottom:28px}
.search-box{display:flex;gap:10px;flex-wrap:wrap}

.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),#a29bfe);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,92,231,.4)}
.btn-accent{background:linear-gradient(135deg,var(--accent2),#55efc4);color:#1a1a24}
.btn-accent:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,206,201,.3)}
.btn-danger{background:linear-gradient(135deg,var(--red),#e17055);color:#fff}

.filters label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);cursor:pointer}
.filters label:hover{color:var(--text)}
.filters input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px}
.filters .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;margin:2px 4px 2px 0}
.badge-movie{background:#6c5ce7;color:#fff}
.badge-tv{background:#00cec9;color:#1a1a24}
.badge-game{background:#fd79a8;color:#fff}
.badge-music{background:#fdcb6e;color:#1a1a24}
.badge-app{background:#00b894;color:#fff}
.badge-other{background:#636e72;color:#fff}
.status{text-align:center;padding:40px 20px;color:var(--text-dim)}
.status .spinner{display:inline-block;width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.results-table{width:100%;border-collapse:collapse;background:var(--bg-card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.results-table thead th{background:var(--bg-card-hover);padding:14px 16px;text-align:left;font-size:13px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.results-table tbody tr{border-bottom:1px solid var(--border);transition:var(--transition);cursor:pointer}
.results-table tbody tr:last-child{border-bottom:none}
.results-table tbody tr:hover{background:var(--bg-card-hover)}
.results-table td{padding:14px 16px;font-size:14px;vertical-align:middle}
.results-table .col-name{min-width:260px}

.download-manager{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:20px;display:none}

.dl-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border)}

.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg-input);border-radius:var(--radius-sm);padding:3px;overflow-x:auto}
.tabs button{padding:8px 20px;border:none;border-radius:6px;background:transparent;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;transition:var(--transition);white-space:nowrap}

.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);box-shadow:var(--shadow);font-size:14px;animation:slideIn .3s ease;max-width:400px}

@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
footer{text-align:center;padding:32px 20px;color:var(--text-dim);font-size:13px;border-top:1px solid var(--border);margin-top:40px}

@media(max-width:768px){.container{padding:12px}.search-box{flex-direction:column}.search-box input[type="text"]{min-width:auto}.btn{justify-content:center}.results-table{font-size:13px}.results-table td,.results-table th{padding:10px 12px}.results-table .col-date{display:none}.detail-header{flex-direction:column}.detail-header .actions{width:100%}.detail-header .actions .btn{flex:1;text-align:center}header h1{font-size:22px}.filters{flex-direction:column;align-items:flex-start}}

/* ========== SEARCH ========== */
function search(q){
  var c=document.getElementById('resultsContent');if(!c)return;
  c.innerHTML='<div class="status"><div class="spinner"></div><p>正在搜索 "<strong>'+e(q)+'</strong>" ...</p><p style="font-size:13px;color:var(--text-dim);margin-top:8px;">正在查询: '+SEARCH_SOURCES.map(function(s){return s.name}).join(' · ')+'</p></div>';
  document.getElementById('resultCount').textContent='搜索中...';

  var promises = [];
  var sourceCounts = {};
  var sourceErrors = [];

  SEARCH_SOURCES.forEach(function(src){
    var rawUrl = src.url(q);

    var p;
    if(src.proxy && src.proxy.length > 0){
      // 通过 CORS 代理（带多代理 fallback）
      p = tryFetch(src.proxy, rawUrl, 8000)
        .then(function(data){
          var items = src.parse(data);
          if(items.length > 0) sourceCounts[src.name] = (sourceCounts[src.name]||0) + items.length;
          return items;
        })
        .catch(function(err){
          sourceErrors.push(src.name+': '+err.message);
          return [];
        });
    } else {
      // 直连（无代理 — 本地服务器环境有效）
      p = fetch(rawUrl, { signal: AbortSignal.timeout(6000) })
        .then(function(r){
          if(!r.ok)throw new Error('HTTP '+r.status);
          return r.json();
        })
        .then(function(data){
          var items = src.parse(data);
          if(items.length > 0) sourceCounts[src.name] = (sourceCounts[src.name]||0) + items.length;
          return items;
        })
        .catch(function(err){
          sourceErrors.push(src.name+': '+err.message);
          return [];
        });
    }

    promises.push(p);
  });

  Promise.all(promises)
    .then(function(resultsArray){
      var all = [];
      resultsArray.forEach(function(items){ all = all.concat(items); });

      // 关键词相关性过滤：只保留名称中包含搜索词的结果
      // 中文搜索时 TPB 会返回无关结果，此过滤确保准确性
      var queryKeywords = q.toLowerCase().split(/[\s,，]+/).filter(function(k){ return k.length > 0; });
      if(queryKeywords.length > 0){
        var before = all.length;
        all = all.filter(function(item){
          var name = (item.name||'').toLowerCase();
          // 只要名称包含任何一个关键词即保留
          return queryKeywords.some(function(kw){
            return name.indexOf(kw) !== -1;
          });
        });
        // 如果过滤后没有结果，放宽限制：只要求名称包含关键词中的至少一个字/词
        if(all.length === 0 && queryKeywords.length > 0){
          all = resultsArray.reduce(function(a, items){ return a.concat(items); }, []);
          all = all.filter(function(item){
            var name = (item.name||'').toLowerCase();
            // 检查是否包含任意一个单字（对中文很有用）
            var chars = q.replace(/[\s,，\.\+\(\)\[\]\d\-_]+/g, '');
            for(var i = 0; i < chars.length; i++){
              if(name.indexOf(chars[i]) !== -1) return true;
            }
            return false;
          });
        }
      }

      // 按做种数排序
      all.sort(function(a,b){ return (b.seeders||0) - (a.seeders||0); });

      // 去重（按 infoHash）
      var seen = {};
      all = all.filter(function(item){
        var key = item.infoHash || item.name;
        if(seen[key]) return false;
        seen[key] = true;
        return true;
      });

      // 限最多80个
      all = all.slice(0, 80);

      results = all.map(function(item){
        return {
          name: item.name, size: item.size, seeders: item.seeders,
          leechers: item.leechers, date: item.date, infoHash: item.infoHash,
          source: item.source, desc: item.desc||'', category: item.category||'',
          magnet: item.magnet||''
        };
      });

      if(results.length > 0){
        render(results);
        var srcInfo = Object.keys(sourceCounts).map(function(k){
          return k+'('+sourceCounts[k]+')';
        }).join(' ');
        document.getElementById('resultCount').textContent='共 '+results.length+' 个结果 · '+srcInfo;
        to('✅ 找到 '+results.length+' 个种子','success');
      } else {
        // 无结果：检测是否为 CORS 问题
        var isCors = sourceErrors.some(function(err){ return err.indexOf('Failed to fetch')!==-1 || err.indexOf('NetworkError')!==-1 || err.indexOf('NetworkError')!==-1; });
        var errHtml = '';
        if(isCors){
          errHtml = '<div class="status"><div style="font-size:48px;margin-bottom:12px;">🌐</div><p style="font-size:16px;font-weight:500;color:var(--yellow);">浏览器安全策略阻止了搜索</p>'
            + '<p style="font-size:13px;color:var(--text-dim);margin-top:8px;">直接打开 HTML 文件时，浏览器限制跨域请求。</p>'
            + '<div style="background:var(--bg-input);border-radius:8px;padding:16px;margin:16px auto;max-width:400px;text-align:left;font-size:13px;">'
            + '<p style="margin-bottom:8px;"><strong>解决方案 (任选其一):</strong></p>'
            + '<p style="margin-bottom:6px;">① 用 <b>Chrome/Edge</b> 打开 (推荐)</p>'
            + '<p style="margin-bottom:6px;">② 使用 Python 启动本地服务器:</p>'
            + '<code style="display:block;background:#1a1a24;padding:8px 12px;border-radius:4px;margin:4px 0 8px;font-size:12px;">python -m http.server 8080<br>然后访问 http://localhost:8080</code>'
            + '<p>③ 用 Node.js:</p>'
            + '<code style="display:block;background:#1a1a24;padding:8px 12px;border-radius:4px;margin:4px 0 0;font-size:12px;">npx serve .</code>'
            + '</div></div>';
        } else {
          errHtml = '<div class="status"><div style="font-size:48px">🔍</div><p style="font-size:16px;font-weight:500;">未找到结果</p>'
            + '<p style="font-size:13px;color:var(--text-dim);margin-top:8px;">请尝试其他关键词，或检查网络连接</p>'
            + (sourceErrors.length > 0 ? '<p style="font-size:12px;color:var(--text-dim);margin-top:8px;">调试: '+e(sourceErrors.join('; '))+'</p>' : '')
            + '</div>';
        }
        c.innerHTML = errHtml;
        document.getElementById('resultCount').textContent='未找到结果';
        to('⚠️ 未找到结果，请尝试其他关键词','info');
      }
    });
}

/* ========== RENDER ========== */
function render(r){
  var c=document.getElementById('resultsContent');if(!c)return;
  if(!r||r.length===0){c.innerHTML='<div class="status"><div style="font-size:48px">🔍</div><p>无结果</p></div>';return}
  // 把数据挂在 DOM 上，确保筛选后点击行能拿到正确对象
  c._data = r;
  var h='<table class="results-table"><thead><tr><th class="col-name">名称</th><th class="col-size">大小</th><th class="col-seed">🌱</th><th class="col-leech">🐛</th><th class="col-date">日期</th><th class="col-action">操作</th></tr></thead><tbody>';
  r.forEach(function(i,idx){
    var hsh=gh(i);h+='<tr data-index="'+idx+'"><td class="col-name"><div class="name">'+cb(i.name)+' '+e(i.name)+'</div><div class="sub">'+(i.source?'<span class="badge" style="background:var(--accent);color:#fff;padding:0 6px;border-radius:4px;font-size:11px;">'+e(i.source)+'</span> ':'')+' · '+(hsh?hsh.substr(0,8)+'...':'')+'</div></td><td class="col-size">'+fb(i.size)+'</td><td class="col-seed '+sc(i.seeders)+'">'+(parseInt(i.seeders)||0)+'</td><td class="col-leech">'+(parseInt(i.leechers)||0)+'</td><td class="col-date">'+fd(i.date)+'</td><td class="col-action"><button class="btn btn-accent btn-sm dl-btn" data-index="'+idx+'">⚡下</button><button class="btn btn-primary btn-sm detail-btn" data-index="'+idx+'" style="margin-left:4px">📂</button></td></tr>';
  });
  h+='</tbody></table>';c.innerHTML=h;
  c.querySelectorAll('.dl-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();dl(c._data[parseInt(this.dataset.index)])})});
  c.querySelectorAll('.detail-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();det(c._data[parseInt(this.dataset.index)])})});
  c.querySelectorAll('tbody tr').forEach(function(b){b.addEventListener('click',function(e){if(e.target.closest('button'))return;det(c._data[parseInt(this.dataset.index)])})});
}

/* ========== DOWNLOAD ========== */
function dl(i){
  var c=gwt();if(!c){to('WebTorrent 不可用，请检查网络','error');return}
  var m=gm(i);if(!m&&i.magnet)m=i.magnet;if(!m){to('无法获取 Magnet 链接','error');return}
  var id=Date.now()+'_'+Math.random().toString(36).substr(2,5),di={id:id,name:i.name||'未知',progress:0,speed:0,downloaded:0,total:i.size||0,peers:0,status:'connecting',torrent:null,error:''};
  ads.set(id,di);rd();document.getElementById('downloadManager').classList.add('active');to('⏳ 连接中...','info');
  try{
    var t=c.add(m,{path:'downloads/'});di.torrent=t;
    t.on('infoHash',function(){di.status='downloading';rd()});
    t.on('download',function(){di.progress=Math.round(t.progress*100);di.speed=t.downloadSpeed;di.downloaded=t.downloaded;di.total=t.length;di.peers=t.numPeers;di.status='downloading';rd()});
    t.on('done',function(){di.progress=100;di.status='completed';di.speed=0;rd();to('✅ '+di.name+' 下载完成','success')});
    t.on('error',function(e){console.error('DL err:',e);di.status='error';di.error=e.message||String(e);rd();to('❌ 下载失败: '+(e.message||String(e)),'error')});
    t.on('warning',function(w){console.warn('DL warn:',w)});
    setTimeout(function(){if(di.status==='connecting'){di.status='stalled';rd()}},15000);
  }catch(e){console.error('DL exc:',e);di.status='error';di.error=e.message||String(e);rd();to('❌ 下载失败: '+(e.message||String(e)),'error')}
}

  });

}

}
